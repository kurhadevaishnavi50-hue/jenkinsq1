apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec: # This must align perfectly with the metadata above it
      containers:
      - name: java-app
        image: vaishru/jenkinsq1:v1
        ports:
          - containerPort: 8080
